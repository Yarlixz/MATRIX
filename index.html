        <p class="secao-label">// calculadora de função linear \\</p>
 
<div class="neo">
    <img src="aurafarm.png" class="neo-logo" alt="logo" />
</div>

  <div class="calc-wrap">
    <div class="calc-linha">
 
      <!-- plano cartesiano -->
      <div class="calc-card calc-plano">
        <p class="calc-card-titulo">plano cartesiano</p>
        <canvas id="calc-canvas" width="240" height="240"></canvas>
      </div>
 
      <!-- inputs -->
      <div class="calc-card calc-inputs">
        <p class="calc-card-titulo">dois pontos</p>
 
        <div class="calc-grid">
          <div class="calc-inp-group">
            <label>x₁</label>
            <input id="x1" type="number" placeholder="0">
          </div>
          <div class="calc-inp-group">
            <label>y₁</label>
            <input id="y1" type="number" placeholder="0">
          </div>
        </div>
 
        <p class="calc-sep">— ponto 2 —</p>
 
        <div class="calc-grid">
          <div class="calc-inp-group">
            <label>x₂</label>
            <input id="x2" type="number" placeholder="0">
          </div>
          <div class="calc-inp-group">
            <label>y₂</label>   
            <input id="y2" type="number" placeholder="0">
          </div>
        </div>
 
        <div class="calc-erro" id="calc-erro">x₁ e x₂ não podem ser iguais</div>
        <button class="calc-btn" onclick="calcular()">calcular →</button>
      </div>
    </div>
 
    <!-- resultado -->
    <div class="calc-card calc-resultado" id="calc-resultado">
      <p class="calc-card-titulo">função encontrada</p>
      <div class="calc-formula" id="calc-formula">y = ax + b</div>
      <p class="calc-card-titulo">passo a passo</p>
      <div class="calc-steps" id="calc-steps"></div>
    </div>
  </div>
